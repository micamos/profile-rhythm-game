<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROFILE SELECTION</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      min-height: 100%;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #e0e5ec;
      color: #5a6a7e;
      overflow-y: auto; overflow-x: hidden;
    }

    /* ニューモフィズム */
    .neu       { background: #e0e5ec; border-radius: 14px; box-shadow:  6px 6px 12px #b8bec7, -6px -6px 12px #fff; }
    .neu-inset { background: #e0e5ec; border-radius: 10px; box-shadow: inset 3px 3px 6px #b8bec7, inset -3px -3px 6px #fff; }

    .app { display: flex; min-height: 100vh; padding: 12px; gap: 12px; }

    /* ===== 左: プロフィール固定 ===== */
    .profile-col {
      flex: 0 0 260px; display: flex; flex-direction: column; gap: 0;
      padding: 28px 24px; overflow-y: auto;
    }
    .profile-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      box-shadow: 6px 6px 12px #b8bec7, -6px -6px 12px #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; background: #e0e5ec; margin-bottom: 24px;
    }
    .profile-name {
      font-size: 26px; font-weight: 900; color: #3a4a5e;
      letter-spacing: 1px; line-height: 1.2;
    }
    .profile-role {
      font-size: 13px; color: #8a9ab0; margin-top: 6px; line-height: 1.5;
    }
    .profile-section {
      margin-top: 24px;
    }
    .profile-section h3 {
      font-size: 12px; font-weight: 700; color: #6b7b8d;
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid #d0d5dc;
    }
    .profile-section li {
      list-style: none; font-size: 13px; color: #5a6a7e;
      padding: 4px 0; padding-left: 12px; position: relative; line-height: 1.6;
    }
    .profile-section li::before {
      content: '・'; position: absolute; left: 0; color: #8a9ab0;
    }
    .profile-divider {
      width: 40px; height: 3px; border-radius: 2px; margin: 20px 0;
      box-shadow: inset 2px 2px 3px #b8bec7, inset -2px -2px 3px #fff;
    }

    /* ===== 右: メインエリア ===== */
    .main-col {
      flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 0;
    }

    /* --- 上部: プレビュー --- */
    .preview-row {
      flex: 0 0 auto; display: flex; gap: 12px;
    }

    /* ジャケットプレビュー */
    .jacket-area {
      flex: 1; padding: 14px;
      display: flex; align-items: stretch; gap: 16px;
      overflow: hidden;
    }
    .jacket-frame {
      width: 200px; aspect-ratio: 16/9; border-radius: 12px; position: relative; flex-shrink: 0;
      box-shadow: inset 4px 4px 10px #b8bec7, inset -4px -4px 10px #fff;
      background: linear-gradient(145deg, #d3d9e2, #eaeff5);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .jacket-emoji { font-size: 48px; opacity: 0.5; transition: all 0.3s; }
    .jacket-badge {
      position: absolute; top: 8px; right: 8px;
      padding: 3px 8px; border-radius: 4px; font-size: 9px; font-weight: 800;
      box-shadow: 2px 2px 4px #b8bec7, -2px -2px 4px #fff; background: #e0e5ec; color: #6b7b8d;
    }
    .jacket-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .jacket-info h2 {
      font-size: 16px; font-weight: 900; color: #3a4a5e; letter-spacing: 0.5px;
      line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden; text-overflow: ellipsis;
    }
    .jacket-info .sub { font-size: 11px; color: #8a9ab0; margin-top: 6px; }
    .jacket-stats { display: flex; gap: 8px; margin-top: 10px; }
    .jacket-stat {
      text-align: center; padding: 5px 10px; border-radius: 8px;
      box-shadow: 3px 3px 6px #b8bec7, -3px -3px 6px #fff;
    }
    .jacket-stat .label { font-size: 8px; color: #8a9ab0; letter-spacing: 2px; text-transform: uppercase; }
    .jacket-stat .val   { font-size: 13px; font-weight: 800; color: #4a5a6e; margin-top: 2px; }


    /* --- 下部: 操作 + ホイール --- */
    .list-area {
      flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 0;
    }
    .diff-tabs { display: flex; gap: 6px; flex-shrink: 0; }
    .diff-tab {
      flex: 1; padding: 7px 0; text-align: center; border: none; cursor: pointer;
      font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #8a9ab0;
      background: #e0e5ec; border-radius: 8px; box-shadow: 3px 3px 6px #b8bec7, -3px -3px 6px #fff;
      transition: box-shadow 0.15s, color 0.15s;
    }
    .diff-tab:hover { box-shadow: 2px 2px 4px #b8bec7, -2px -2px 4px #fff; }
    .diff-tab.active { box-shadow: inset 3px 3px 6px #b8bec7, inset -3px -3px 6px #fff; color: #4a5a6e; }

    .arrow-btn {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border: none; cursor: pointer;
      background: #e0e5ec; border-radius: 10px;
      box-shadow: 3px 3px 6px #b8bec7, -3px -3px 6px #fff;
      font-size: 16px; color: #8a9ab0; transition: box-shadow 0.12s, color 0.12s;
      user-select: none; align-self: center;
    }
    .arrow-btn:hover { color: #4a5a6e; box-shadow: 2px 2px 4px #b8bec7, -2px -2px 4px #fff; }
    .arrow-btn:active { box-shadow: inset 3px 3px 6px #b8bec7, inset -3px -3px 6px #fff; }

    .wheel-container {
      flex: 1; min-height: 0; position: relative; overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
    }
    .wheel { position: absolute; width: 100%; height: 100%; left: 0; top: 0; }

    .wheel-item {
      position: absolute;
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 10px;
      background: #e0e5ec; cursor: pointer;
      box-shadow: 3px 3px 6px #b8bec7, -3px -3px 6px #fff;
      transition: box-shadow 0.3s, padding 0.3s, border-radius 0.3s;
      transform-origin: right center;
    }
    .wheel-item.selected {
      padding: 16px 18px;
      border-radius: 14px;
      box-shadow: inset 5px 5px 10px #b8bec7, inset -5px -5px 10px #fff;
    }

    .song-thumb {
      width: 36px; height: 36px; border-radius: 6px; flex-shrink: 0;
      box-shadow: 2px 2px 4px #b8bec7, -2px -2px 4px #fff;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      background: linear-gradient(145deg, #d5dbe3, #eaeff5);
      overflow: hidden;
      transition: all 0.3s;
    }
    .wheel-item.selected .song-thumb {
      width: 64px; height: 64px; font-size: 26px; border-radius: 10px;
      box-shadow: inset 3px 3px 6px #b8bec7, inset -3px -3px 6px #fff;
    }
    .song-body { flex: 1; min-width: 0; }
    .song-body .s-title {
      font-size: 11px; font-weight: 700; color: #6b7b8d;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: all 0.3s;
    }
    .wheel-item.selected .song-body .s-title { font-size: 15px; font-weight: 800; color: #3a4a5e; }
    .song-body .s-artist { font-size: 9px; color: #a0aab8; margin-top: 1px; transition: all 0.3s; }
    .wheel-item.selected .song-body .s-artist { font-size: 11px; color: #8a9ab0; }
    .song-mid { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; flex-shrink: 0; }
    .diff-badge { padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 800; letter-spacing: 1px; }
    .diff-easy   { box-shadow: inset 2px 2px 3px #b8bec7, inset -2px -2px 3px #fff; color: #6a9a7e; }
    .diff-normal { box-shadow: inset 2px 2px 3px #b8bec7, inset -2px -2px 3px #fff; color: #8a8a5e; }
    .diff-hard   { box-shadow: inset 2px 2px 3px #b8bec7, inset -2px -2px 3px #fff; color: #9a6a6a; }
    .s-stars { font-size: 10px; color: #b0bac8; letter-spacing: 1px; }
    .song-end { flex-shrink: 0; text-align: right; }
    .clear-badge {
      padding: 3px 10px; border-radius: 6px; font-size: 9px; font-weight: 800; letter-spacing: 1px;
      box-shadow: 2px 2px 4px #b8bec7, -2px -2px 4px #fff; color: #6a9a7e;
    }
    .lock-badge {
      padding: 3px 10px; border-radius: 6px; font-size: 9px; font-weight: 800; letter-spacing: 1px;
      box-shadow: inset 2px 2px 4px #b8bec7, inset -2px -2px 4px #fff; color: #b0bac8;
    }
    .wheel-item.locked {
      opacity: 0.5 !important; cursor: default;
    }
    .wheel-item.locked .song-thumb { filter: grayscale(1) brightness(0.85); }
    .wheel-item.locked .song-body .s-title { color: #b0bac8; }
    .wheel-item.locked .song-body .s-artist { color: #c8cdd5; }

    .jacket-locked-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      background: rgba(224,229,236,0.85); border-radius: 12px;
      font-size: 28px; color: #b0bac8;
    }
    .jacket-locked-overlay span { font-size: 11px; font-weight: 700; letter-spacing: 2px; }

    .start-btn {
      flex-shrink: 0; padding: 14px; text-align: center; border: none; cursor: pointer;
      font-size: 18px; font-weight: 900; letter-spacing: 6px; color: #4a5a6e;
      background: #e0e5ec; border-radius: 12px;
      box-shadow: 6px 6px 12px #b8bec7, -6px -6px 12px #fff;
      transition: box-shadow 0.15s;
    }
    .start-btn:hover { box-shadow: 3px 3px 6px #b8bec7, -3px -3px 6px #fff; }
    .start-btn:active { box-shadow: inset 4px 4px 8px #b8bec7, inset -4px -4px 8px #fff; }

    /* ===== 太鼓ゲームオーバーレイ ===== */
    .taiko-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: #e0e5ec;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.4s;
    }
    .taiko-overlay.active { opacity: 1; pointer-events: auto; }

    .taiko-header {
      position: absolute; top: 20px; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 32px;
    }
    .taiko-score-box {
      padding: 10px 24px; border-radius: 12px;
      box-shadow: 6px 6px 12px #b8bec7, -6px -6px 12px #fff;
      font-size: 14px; font-weight: 800; color: #3a4a5e; letter-spacing: 2px;
    }
    .taiko-score-box span { font-size: 28px; margin-left: 8px; }
    .taiko-combo-box {
      padding: 10px 24px; border-radius: 12px;
      box-shadow: 6px 6px 12px #b8bec7, -6px -6px 12px #fff;
      font-size: 14px; font-weight: 800; color: #3a4a5e; letter-spacing: 2px; text-align: center;
    }
    .taiko-combo-box span { font-size: 28px; display: block; }

    .taiko-stage {
      width: 90%; max-width: 900px; height: 180px;
      border-radius: 18px;
      box-shadow: inset 6px 6px 14px #b8bec7, inset -6px -6px 14px #fff;
      position: relative; overflow: hidden;
    }
    .taiko-canvas { width: 100%; height: 100%; display: block; }

    .taiko-judge {
      position: absolute; top: 50%; left: 120px; transform: translate(-50%, -50%);
      font-size: 28px; font-weight: 900; letter-spacing: 2px;
      opacity: 0; transition: opacity 0.15s, transform 0.15s;
      pointer-events: none; text-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .taiko-judge.show { opacity: 1; transform: translate(-50%, -60%); }
    .taiko-judge.perfect { color: #e8a030; }
    .taiko-judge.good { color: #6a9a7e; }
    .taiko-judge.miss { color: #9a6a6a; }

    .taiko-controls {
      margin-top: 20px; display: flex; gap: 16px; align-items: center;
    }
    .taiko-key-hint {
      padding: 10px 18px; border-radius: 10px;
      box-shadow: 3px 3px 6px #b8bec7, -3px -3px 6px #fff;
      font-size: 12px; font-weight: 700; color: #5a6a7e; text-align: center;
    }
    .taiko-key-hint .key {
      display: inline-block; min-width: 28px; padding: 3px 8px; margin: 2px;
      border-radius: 6px; font-size: 14px; font-weight: 800;
      box-shadow: inset 2px 2px 4px #b8bec7, inset -2px -2px 4px #fff;
    }

    .taiko-progress {
      width: 90%; max-width: 900px; height: 8px; margin-top: 16px;
      border-radius: 4px;
      box-shadow: inset 2px 2px 4px #b8bec7, inset -2px -2px 4px #fff;
      overflow: hidden;
    }
    .taiko-progress-bar {
      height: 100%; width: 0%; background: #8a9ab0; border-radius: 4px;
      transition: width 0.1s;
    }

    /* ===== リザルト画面 ===== */
    .result-overlay {
      position: fixed; inset: 0; z-index: 1100;
      background: #e0e5ec;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; opacity: 0; pointer-events: none; transition: opacity 0.5s;
    }
    .result-overlay.active { opacity: 1; pointer-events: auto; }

    .result-title {
      font-size: 36px; font-weight: 900; color: #3a4a5e;
      letter-spacing: 4px;
    }
    .result-score-display {
      padding: 20px 48px; border-radius: 18px;
      box-shadow: 6px 6px 14px #b8bec7, -6px -6px 14px #fff;
      text-align: center;
    }
    .result-score-display .label { font-size: 12px; color: #8a9ab0; letter-spacing: 3px; }
    .result-score-display .score { font-size: 52px; font-weight: 900; color: #3a4a5e; }

    .result-stats {
      display: flex; gap: 16px;
    }
    .result-stat {
      padding: 12px 20px; border-radius: 12px;
      box-shadow: 4px 4px 8px #b8bec7, -4px -4px 8px #fff;
      text-align: center; min-width: 80px;
    }
    .result-stat .label { font-size: 10px; color: #8a9ab0; letter-spacing: 2px; }
    .result-stat .val { font-size: 20px; font-weight: 800; margin-top: 4px; }
    .result-stat .val.perfect { color: #e8a030; }
    .result-stat .val.good { color: #6a9a7e; }
    .result-stat .val.miss { color: #9a6a6a; }

    .result-unlock {
      padding: 20px 28px; border-radius: 14px;
      box-shadow: 6px 6px 12px #b8bec7, -6px -6px 12px #fff;
      max-width: 500px; max-height: 260px; overflow-y: auto; text-align: center;
      display: flex; flex-direction: column; gap: 8px;
    }
    .result-unlock h3 {
      font-size: 14px; color: #8a9ab0; letter-spacing: 2px; margin-bottom: 12px;
    }
    .result-unlock-link {
      display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit;
      padding: 10px; border-radius: 10px;
      box-shadow: inset 3px 3px 6px #b8bec7, inset -3px -3px 6px #fff;
      transition: box-shadow 0.2s;
    }
    .result-unlock-link:hover {
      box-shadow: inset 2px 2px 4px #b8bec7, inset -2px -2px 4px #fff;
    }
    .result-unlock-link img {
      width: 60px; height: 60px; border-radius: 8px; object-fit: cover; flex-shrink: 0;
    }
    .result-unlock-link .info { text-align: left; }
    .result-unlock-link .info .t { font-size: 13px; font-weight: 700; color: #3a4a5e; }
    .result-unlock-link .info .d { font-size: 11px; color: #8a9ab0; margin-top: 4px; }

    .result-back-btn {
      padding: 14px 40px; border: none; cursor: pointer;
      font-size: 16px; font-weight: 800; letter-spacing: 4px; color: #4a5a6e;
      background: #e0e5ec; border-radius: 12px;
      box-shadow: 6px 6px 12px #b8bec7, -6px -6px 12px #fff;
      transition: box-shadow 0.15s;
    }
    .result-back-btn:hover { box-shadow: 3px 3px 6px #b8bec7, -3px -3px 6px #fff; }
    .result-back-btn:active { box-shadow: inset 4px 4px 8px #b8bec7, inset -4px -4px 8px #fff; }

    @media (max-width: 900px) {
      body { overflow-y: auto; }
      .app {
        flex-direction: column; height: auto; min-height: auto; padding: 10px; gap: 10px;
      }
      .profile-col {
        flex: none; padding: 20px 18px;
      }
      .profile-avatar { width: 72px; height: 72px; margin-bottom: 16px; }
      .profile-name { font-size: 22px; }
      .main-col { flex: none; min-height: auto; }
      .preview-row { flex-direction: column; }
      .jacket-area { flex-direction: column; align-items: center; padding: 12px; }
      .jacket-frame { width: 100%; max-width: 300px; }
      .jacket-info h2 { font-size: 14px; }
      .list-area { flex: none; min-height: auto; }
      .wheel-container { height: 320px; flex: none; }
      .start-btn { font-size: 16px; padding: 12px; letter-spacing: 4px; }

      /* 太鼓ゲーム モバイル */
      .taiko-header { top: 10px; padding: 0 12px; }
      .taiko-score-box { padding: 6px 12px; font-size: 11px; }
      .taiko-score-box span { font-size: 20px; }
      .taiko-combo-box { padding: 6px 12px; font-size: 11px; }
      .taiko-combo-box span { font-size: 20px; }
      #taikoSongName { font-size: 12px !important; }
      .taiko-stage { width: 95%; height: 120px; }
      .taiko-controls { gap: 8px; }

      /* リザルト モバイル */
      .result-overlay { padding: 20px; gap: 16px; overflow-y: auto; }
      .result-title { font-size: 24px; }
      .result-score-display { padding: 14px 28px; }
      .result-score-display .score { font-size: 36px; }
      .result-stats { flex-wrap: wrap; gap: 8px; justify-content: center; }
      .result-stat { padding: 8px 14px; min-width: 65px; }
      .result-unlock { max-width: 100%; max-height: 200px; padding: 14px; }
      .result-unlock-link img { width: 44px; height: 44px; }
    }

    /* タッチ用太鼓ボタン */
    .taiko-touch-btns {
      display: none; gap: 12px; margin-top: 12px; position: relative; z-index: 1;
    }
    .taiko-touch-btn {
      flex: 1; padding: 24px 0; border: none; cursor: pointer;
      border-radius: 16px; font-size: 24px; font-weight: 900;
      background: #e0e5ec; color: #4a5a6e;
      box-shadow: 6px 6px 12px #b8bec7, -6px -6px 12px #fff;
      transition: box-shadow 0.1s; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .taiko-touch-btn:active {
      box-shadow: inset 4px 4px 8px #b8bec7, inset -4px -4px 8px #fff;
    }
    .taiko-touch-btn.don { color: #c47070; }
    .taiko-touch-btn.ka { color: #6088b0; }

    @media (max-width: 900px) {
      .taiko-touch-btns { display: flex; }
      .taiko-controls .taiko-key-hint { font-size: 10px; padding: 6px 10px; }
      .taiko-key-hint .key { font-size: 11px; min-width: 22px; padding: 2px 5px; }
    }
    @media (pointer: coarse) {
      .taiko-touch-btns { display: flex; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ===== 左: プロフィール固定 ===== -->
  <div class="profile-col neu">
    <div class="profile-avatar">
      <img src="avatar.png" alt="mos" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
    </div>
    <h1 class="profile-name">mos - モス -</h1>
    <p class="profile-role">Reazon HD 新規Mobile appの<br>プロダクトデザイナー</p>

    <div class="profile-section">
      <h3>略歴</h3>
      <ul>
        <li>BEAMS</li>
        <li>THECOO（Fanicon）</li>
        <li>Findy（Findy Team+）</li>
      </ul>
    </div>
  </div>

  <!-- ===== 右: メインエリア ===== -->
  <div class="main-col">

    <!-- 上段: プレビュー -->
    <div class="preview-row">
      <a class="jacket-area neu" id="jacketLink" href="#" target="_blank" style="text-decoration:none; color:inherit; cursor:pointer;">
        <div class="jacket-frame" id="jacketFrame">
          <img id="jacketImg" src="" alt="" style="width:100%; height:100%; object-fit:cover; border-radius:12px; display:none;">
          <span class="jacket-emoji" id="jacketEmoji">📝</span>
          <span class="jacket-badge" id="jacketBadge">2025</span>
          <div class="jacket-locked-overlay" id="jacketLock">🔒<span>PLAY TO UNLOCK</span></div>
        </div>
        <div class="jacket-info">
          <h2 id="jacketTitle">note記事</h2>
          <p class="sub" id="jacketSub">記事を選択してください</p>
          <div class="jacket-stats">
            <div class="jacket-stat"><div class="label">Date</div><div class="val" id="statDate">-</div></div>
            <div class="jacket-stat"><div class="label">Diff</div><div class="val" id="statDiff">-</div></div>
            <div class="jacket-stat"><div class="label">Stars</div><div class="val" id="statStars">★★★</div></div>
          </div>
        </div>
      </a>
    </div>

    <!-- 下段: 曲選択エリア -->

const ANGLE_STEP = 18;
const RADIUS = 450;
const MAX_PUSH = 30;
const BASE_RIGHT = 4;
const BASE_WIDTH_PCT = 60;
const SELECTED_EXTRA_W = 36;
let selectedIndex = 0;
let currentAngle = 0;
let targetAngle = 0;
let animId = null;

function buildWheel() {
  wheelEl.innerHTML = '';

  containerH = containerEl.clientHeight;
  songs.forEach((song, i) => {
    const el = document.createElement('div');

    el.innerHTML = `

        ${song.thumb

      <div class="song-end">
        ${unlocked ? '<span class="clear-badge">CLEAR</span>' : '<span class="lock-badge">LOCK</span>'}
      </div>
    `;
    el.addEventListener('click', () => selectByIndex(i));
    wheelEl.appendChild(el);
    wheelItems.push(el);
  });
  layoutWheel();
}

function layoutWheel() {
  const centerY = containerH / 2;
  wheelItems.forEach((el, i) => {
    const angle = i * ANGLE_STEP - currentAngle;
    const rad = angle * Math.PI / 180;
    const y = Math.sin(rad) * RADIUS;
    const cosVal = Math.cos(rad);
    const xPush = cosVal > 0 ? cosVal * MAX_PUSH : 0;

    let normAngle = Math.abs(angle % 360);
    if (normAngle > 180) normAngle = 360 - normAngle;
    const opacity = Math.max(0, 1 - normAngle / 70);
    const scale = Math.max(0.55, 1 - normAngle / 100);
    const w = BASE_WIDTH_PCT + (cosVal > 0 ? cosVal * SELECTED_EXTRA_W : 0);

    el.style.width = w + '%';
    el.style.top = (centerY + y - ITEM_H / 2) + 'px';
    el.style.right = BASE_RIGHT + 'px';
    el.style.left = 'auto';
    el.style.transform = `translateX(-${xPush}px) scale(${scale})`;
    el.style.opacity = opacity;
    el.style.zIndex = Math.round((1 - normAngle / 180) * 100);
    el.style.pointerEvents = opacity < 0.15 ? 'none' : 'auto';
    el.classList.toggle('selected', i === selectedIndex);
  });
}

function selectByIndex(i) {
  selectedIndex = i;
  targetAngle = i * ANGLE_STEP;
  updateDetail(songs[i]);
  animateWheel();
}

function moveBy(delta) {
  selectedIndex = (selectedIndex + delta + songs.length) % songs.length;
  targetAngle = selectedIndex * ANGLE_STEP;
  updateDetail(songs[selectedIndex]);
  animateWheel();
}

function animateWheel() {
  if (animId) cancelAnimationFrame(animId);
  (function step() {
    const diff = targetAngle - currentAngle;
    if (Math.abs(diff) < 0.3) { currentAngle = targetAngle; layoutWheel(); return; }
    currentAngle += diff * 0.18;
    layoutWheel();
    animId = requestAnimationFrame(step);
  })();
}

/* ===== BGM生成 (Web Audio API) ===== */
let audioCtx = null;
let bgmNodes = [];

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playBGM(variant) {
  initAudio();
  stopBGM();

  const v = variant;
  const beatSec = 60 / v.bpm;
  const now = audioCtx.currentTime + 0.1;
  const maxT = v.duration / 1000 + 1;

  const master = audioCtx.createGain();
  master.gain.value = 0.25;
  master.connect(audioCtx.destination);
  bgmNodes.push(master);

  // ベースライン
  for (let loop = 0; loop < 6; loop++) {
    v.bass.forEach((note, i) => {
      const t = now + (loop * v.bass.length + i) * beatSec * 0.5;
      if (t > now + maxT) return;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = v.bassFreq * v.scale[note];
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + beatSec * 0.4);
      osc.connect(g); g.connect(master);
      osc.start(t); osc.stop(t + beatSec * 0.5);
      bgmNodes.push(osc, g);
    });
  }

  // メロディ
  for (let loop = 0; loop < 4; loop++) {
    v.melody.forEach((note, i) => {
      const t = now + (loop * v.melody.length + i) * beatSec * 0.5;
      if (t > now + maxT || note < 0) return;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = v.melWave;
      osc.frequency.value = v.melBase * v.scale[note];
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + beatSec * 0.35);
      osc.connect(g); g.connect(master);
      osc.start(t); osc.stop(t + beatSec * 0.45);
      bgmNodes.push(osc, g);
    });
  }

  // ドラムパターン
  const totalBeats = Math.ceil(maxT / (beatSec * 0.5));
  for (let i = 0; i < totalBeats; i++) {
    const t = now + i * beatSec * 0.5;
    if (t > now + maxT) break;

    if (v.kickPattern(i)) {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
      g.gain.setValueAtTime(0.5, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      osc.connect(g); g.connect(master);
      osc.start(t); osc.stop(t + 0.2);
      bgmNodes.push(osc, g);
    }

    const bufSize = audioCtx.sampleRate * 0.04;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let s = 0; s < bufSize; s++) data[s] = (Math.random() * 2 - 1) * (1 - s / bufSize);
    const src = audioCtx.createBufferSource();
    const hg = audioCtx.createGain();
    src.buffer = buf;
    hg.gain.setValueAtTime(v.hhVol[i % 2], t);
    hg.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 8000;
    src.connect(hp); hp.connect(hg); hg.connect(master);
    src.start(t);
    bgmNodes.push(src, hg, hp);
  }
}

function stopBGM() {
  bgmNodes.forEach(node => {
    try { if (node.stop) node.stop(); } catch(e) {}
    try { node.disconnect(); } catch(e) {}
  });
  bgmNodes = [];
}

// ドン/カッ効果音
function playSE(type) {
  initAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  if (type === 'don') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.12);
    g.gain.setValueAtTime(0.5, now);
    g.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.2);
  } else {
    const bufSize = audioCtx.sampleRate * 0.06;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let s = 0; s < bufSize; s++) data[s] = (Math.random() * 2 - 1) * (1 - s / bufSize);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 3000;
    g.gain.setValueAtTime(0.4, now);
    g.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
    src.connect(hp); hp.connect(g); g.connect(audioCtx.destination);
    src.start(now);
  }
}

/* ===== 超人ノーツ特殊能力 ===== */
// 'normal'   = 通常
// 'curve'    = 変化球（蛇行しながら来る）
// 'spinoff'  = 途中でスピンオフ（急に方向転換）
// 'outside'  = 外からくる（上下から飛んでくる）
// 'bunshin'  = 分身（偽物が3つ、本物は1つ）
// 'shrink'   = 急にサイズが小さくなる
const SPECIAL_TYPES = ['curve', 'spinoff', 'outside', 'bunshin', 'shrink'];

function generateNotes(variant) {
  const v = variant;
  const notes = [];
  let t = 1500;
  let noteIndex = 0;
  while (t < v.duration - 500) {
    const type = Math.random() < 0.55 ? 'don' : 'ka';
    // 最初の数ノーツは通常、その後30%の確率で超人ノーツ
    let special = 'normal';
    if (noteIndex > 3 && Math.random() < 0.30) {
      special = SPECIAL_TYPES[Math.floor(Math.random() * SPECIAL_TYPES.length)];
    }
    const note = { time: t, type, hit: false, missed: false, special };
    // 分身: 本体+偽物の情報を付与
    if (special === 'bunshin') {
      note.bunshinCount = 3;
      note.bunshinSeed = Math.random() * 1000;
    }
    // 外から: 飛んでくる方向
    if (special === 'outside') {
      note.fromTop = Math.random() < 0.5;
    }
    // 変化球: 振幅とスピード
    if (special === 'curve') {
      note.curveAmp = 30 + Math.random() * 40;
      note.curveFreq = 3 + Math.random() * 4;
    }
    // スピンオフ: 発動タイミング
    if (special === 'spinoff') {
      note.spinOffAt = 0.3 + Math.random() * 0.3; // 進行30~60%で発動
      note.spinDir = Math.random() < 0.5 ? 1 : -1;
    }
    // 縮小: 発動タイミング
    if (special === 'shrink') {
      note.shrinkAt = 0.4 + Math.random() * 0.3;
    }
    notes.push(note);
    noteIndex++;
    const gap = v.minGap + Math.random() * v.gapRange;
    // 連打パターン
    if (Math.random() < v.burstChance && t + v.minGap * (v.burstCount + 1) < v.duration - 500) {
      for (let j = 0; j < v.burstCount; j++) {
        t += v.minGap;
        notes.push({ time: t, type: Math.random() < 0.5 ? 'don' : 'ka', hit: false, missed: false, special: 'normal' });
        noteIndex++;
      }
    }
    t += gap;
  }
  gameDuration = v.duration;
  currentNoteSpeed = v.noteSpeed;
  return notes;
}

function updateHypeLevel() {

  for (let i = HYPE_THRESHOLDS.length - 1; i >= 0; i--) {

  if (newLevel !== lastHypeLevel) {

    hypeGauge.style.color = HYPE_COLORS[newLevel];

      const rect = crowdLayer.getBoundingClientRect();

      for (let i = 0; i < newLevel * 3; i++) {
        setTimeout(() => spawnFirework(

function renderCrowdEffects() {
  let crowdCanvas = crowdLayer.querySelector('canvas');
  if (!crowdCanvas) {
    crowdCanvas = document.createElement('canvas');
    crowdCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
    crowdLayer.appendChild(crowdCanvas);
  }
  crowdCanvas.width = crowdLayer.clientWidth;
  crowdCanvas.height = crowdLayer.clientHeight;
  const cctx = crowdCanvas.getContext('2d');
  const cW = crowdCanvas.width, cH = crowdCanvas.height;
  cctx.clearRect(0, 0, cW, cH);
  const now = performance.now();

  // 画面シェイク
  if (screenShake > 0) {
    const sx = (Math.random() - 0.5) * screenShake * 2;
    const sy = (Math.random() - 0.5) * screenShake * 2;
    taikoOverlay.style.transform = `translate(${sx}px, ${sy}px)`;
    screenShake *= 0.9;
    if (screenShake < 0.3) { screenShake = 0; taikoOverlay.style.transform = ''; }
  }

  // 高レベル時の背景グロー（より派手）
  if (hypeLevel >= 2) {
    const intensity = [0, 0, 0.03, 0.06, 0.12][hypeLevel];
    const pulse = Math.sin(now * 0.004) * 0.03;
    cctx.save();
    cctx.globalAlpha = intensity + pulse;
    // マルチカラーグロー
    if (hypeLevel >= 4) {
      const hue = (now * 0.05) % 360;
      const glow1 = cctx.createRadialGradient(cW*0.2, cH*0.5, 0, cW*0.2, cH*0.5, cW*0.5);
      glow1.addColorStop(0, `hsl(${hue},80%,60%)`);
      glow1.addColorStop(1, 'transparent');
      cctx.fillStyle = glow1;
      cctx.fillRect(0, 0, cW, cH);
      const glow2 = cctx.createRadialGradient(cW*0.8, cH*0.5, 0, cW*0.8, cH*0.5, cW*0.5);
      glow2.addColorStop(0, `hsl(${(hue+180)%360},80%,60%)`);
      glow2.addColorStop(1, 'transparent');
      cctx.fillStyle = glow2;
      cctx.fillRect(0, 0, cW, cH);
    } else {
      const glow = cctx.createRadialGradient(cW/2, cH/2, 0, cW/2, cH/2, cW*0.6);
      glow.addColorStop(0, HYPE_COLORS[hypeLevel]);
      glow.addColorStop(1, 'transparent');
      cctx.fillStyle = glow;
      cctx.fillRect(0, 0, cW, cH);
    }
    cctx.restore();
  }

  // パーティクル
  hypeParticles = hypeParticles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.type === 'firework') {
      p.vy += 0.08;
      p.vx *= 0.98;
      // 軌跡
      if (p.trail) { p.trail.push({x:p.x, y:p.y}); if (p.trail.length > 6) p.trail.shift(); }
    }
    if (p.type === 'flame') { p.vx += (Math.random()-0.5)*0.4; p.size *= 0.96; }
    if (p.life <= 0) return false;

    cctx.save();
    cctx.globalAlpha = p.life;
    if (p.type === 'flame') {
      const grad = cctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      grad.addColorStop(0, p.color);
      grad.addColorStop(0.7, p.color + '80');
      grad.addColorStop(1, 'transparent');
      cctx.fillStyle = grad;
      cctx.beginPath();
      cctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      cctx.fill();
    } else {
      // 花火軌跡
      if (p.trail && p.trail.length > 1) {
        cctx.strokeStyle = p.color;
        cctx.lineWidth = p.size * 0.5 * p.life;
        cctx.beginPath();
        p.trail.forEach((pt, i) => { i === 0 ? cctx.moveTo(pt.x, pt.y) : cctx.lineTo(pt.x, pt.y); });
        cctx.globalAlpha = p.life * 0.4;
        cctx.stroke();
        cctx.globalAlpha = p.life;
      }
      cctx.fillStyle = p.color;
      cctx.shadowColor = p.color;
      cctx.shadowBlur = 8;
      cctx.beginPath();
      cctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
      cctx.fill();
      cctx.shadowBlur = 0;
    }
    cctx.restore();
    return true;
  });

  // ニコニコ弾幕コメント描画
  hypeComments = hypeComments.filter(c => {
    c.x -= c.speed;
    if (c.x < -600) return false;

    cctx.save();
    cctx.font = `${c.bold ? 'bold ' : ''}${c.fontSize}px 'Helvetica Neue', Arial, sans-serif`;
    cctx.textAlign = 'left';
    cctx.textBaseline = 'middle';

    if (c.glow) {
      cctx.shadowColor = c.color;
      cctx.shadowBlur = 12;
    }
    if (c.outline) {
      cctx.strokeStyle = 'rgba(0,0,0,0.5)';
      cctx.lineWidth = 3;
      cctx.strokeText(c.text, c.x, c.y);
    }
    cctx.fillStyle = c.color;
    cctx.fillText(c.text, c.x, c.y);
    cctx.shadowBlur = 0;
    cctx.restore();
    return true;
  });

  // でかいテキスト演出
  bigTexts = bigTexts.filter(bt => {
    bt.life -= bt.decay;
    bt.scale += (bt.targetScale - bt.scale) * 0.15;
    if (bt.life <= 0) return false;

    cctx.save();
    cctx.globalAlpha = Math.min(bt.life * 2, 1);
    cctx.translate(cW / 2, cH * bt.y);
    cctx.scale(bt.scale, bt.scale);
    cctx.font = 'bold 36px sans-serif';
    cctx.textAlign = 'center';
    cctx.textBaseline = 'middle';
    cctx.shadowColor = bt.color;
    cctx.shadowBlur = 20;
    cctx.strokeStyle = 'rgba(0,0,0,0.6)';
    cctx.lineWidth = 4;
    cctx.strokeText(bt.text, 0, 0);
    cctx.fillStyle = bt.color;
    cctx.fillText(bt.text, 0, 0);
    // 二重グロー
    cctx.shadowBlur = 40;
    cctx.globalAlpha *= 0.3;
    cctx.fillText(bt.text, 0, 0);
    cctx.restore();
    return true;
  });

  // エモート（踊る犬、爆発など）
  hypeEmotes = hypeEmotes.filter(e => {
    e.life -= e.decay;
    if (e.life <= 0) return false;

    cctx.save();
    cctx.globalAlpha = Math.min(e.life * 1.5, 1);

    if (e.dancing) {
      e.wobble += 0.1;
      const dx = e.x + Math.sin(e.wobble) * 25;
      const dy = e.y + Math.sin(e.wobble * 2.5) * 12;
      const rot = Math.sin(e.wobble * 1.7) * 0.4;
      const bounce = 1 + Math.abs(Math.sin(e.wobble * 2)) * 0.15;
      cctx.translate(dx, dy);
      cctx.rotate(rot);
      cctx.scale(bounce, bounce);
      cctx.font = `${e.size}px sans-serif`;
      cctx.textAlign = 'center';
      cctx.fillText(e.text, 0, 0);
    } else if (e.exploding) {
      e.x += e.vx;
      e.y += e.vy;
      e.vy += 0.05;
      const rot = e.life * 5;
      cctx.translate(e.x, e.y);
      cctx.rotate(rot);
      cctx.font = `${e.size}px sans-serif`;
      cctx.textAlign = 'center';
      cctx.fillText(e.text, 0, 0);
    } else {
      e.y += (e.vy || -1.5);
      e.x += (e.vx || 0);
      e.wobble = (e.wobble || 0) + 0.05;
      cctx.translate(e.x + Math.sin(e.wobble) * 10, e.y);
      cctx.font = `${e.size}px sans-serif`;
      cctx.textAlign = 'center';
      cctx.fillText(e.text, 0, 0);
    }
    cctx.restore();
    return true;
  });

  // Lv4: 常時パーティクルシャワー
  if (hypeLevel >= 4 && Math.random() < 0.3) {
    const rect = crowdLayer.getBoundingClientRect();
    hypeParticles.push({
      x: Math.random() * rect.width, y: -5,
      vx: (Math.random()-0.5)*1, vy: 1 + Math.random()*2,
      life: 1, decay: 0.01,
      size: 2 + Math.random()*3,
      color: `hsl(${Math.random()*360},80%,65%)`,
      type: 'firework', trail: [],
    });
  }
  // Lv3+: 常時弾幕が流れる
  if (hypeLevel >= 3 && Math.random() < 0.08) spawnDanmaku(hypeLevel);
  if (hypeLevel >= 4 && Math.random() < 0.12) spawnDanmaku(4);
}

function startTaikoGame() {
  // リセット
  gameScore = 0; gameCombo = 0; gameMaxCombo = 0;
  gamePerfect = 0; gameGood = 0; gameMiss = 0;
  hypeLevel = 0; lastHypeLevel = -1;
  hypeParticles = []; hypeEmotes = [];
  hypeGauge.style.opacity = '0';
  const oldCanvas = crowdLayer.querySelector('canvas');
  if (oldCanvas) oldCanvas.remove();
  currentSongVariant = songVariants[Math.floor(Math.random() * songVariants.length)];
  gameNotes = generateNotes(currentSongVariant);
  taikoScoreEl.textContent = '0';
  taikoComboEl.textContent = '0';
  taikoProgressEl.style.width = '0%';
  document.getElementById('taikoSongName').textContent = '♪ ' + currentSongVariant.name;

  resizeTaikoCanvas();
  taikoOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  gameActive = true;

  // カウントダウン後にスタート
  let countdown = 3;
  const cdInterval = setInterval(() => {
    if (countdown > 0) {
      showJudge(countdown, '');
      countdown--;
    } else {
      clearInterval(cdInterval);
      showJudge('GO!', 'perfect');
      gameStartTime = performance.now();
      playBGM(currentSongVariant);
      gameAnimId = requestAnimationFrame(taikoGameLoop);
    }
  }, 700);
}

function taikoGameLoop(now) {
  if (!gameActive) return;
  const elapsed = now - gameStartTime;
  const progress = Math.min(elapsed / gameDuration, 1);
  taikoProgressEl.style.width = (progress * 100) + '%';

  // ミス判定: 判定ラインを通過したノーツ
  gameNotes.forEach(note => {
    if (!note.hit && !note.missed && elapsed > note.time + GOOD_WINDOW + 50) {
      note.missed = true;
      gameMiss++;
      gameCombo = 0;
      taikoComboEl.textContent = gameCombo;
      showJudge('MISS', 'miss');
    }
  });

  updateHypeLevel();
  drawTaikoFrame(elapsed);
  renderCrowdEffects();

  if (elapsed < gameDuration + 1000) {
    gameAnimId = requestAnimationFrame(taikoGameLoop);
  } else {
    endTaikoGame();
  }
}

function drawTaikoFrame(elapsed) {
  const W = taikoCanvas.width;
  const H = taikoCanvas.height;
  const ctx = taikoCtx;
  ctx.clearRect(0, 0, W, H);

  // レーン背景
  const laneY = H / 2;
  ctx.fillStyle = '#d5dae2';
  ctx.fillRect(0, laneY - 36, W, 72);

  // 判定ライン（太鼓の円）
  ctx.beginPath();
  ctx.arc(HIT_X, laneY, 32, 0, Math.PI * 2);
  ctx.strokeStyle = '#b0bac8';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(HIT_X, laneY, 28, 0, Math.PI * 2);
  ctx.fillStyle = '#e0e5ec';
  ctx.fill();
  ctx.strokeStyle = '#c8cdd5';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 太鼓の内側
  ctx.beginPath();
  ctx.arc(HIT_X, laneY, 16, 0, Math.PI * 2);
  ctx.fillStyle = '#d0d5dc';
  ctx.fill();

  // ノーツ描画（超人太鼓の達人対応）
  gameNotes.forEach(note => {
    if (note.hit || note.missed) return;
    const noteTime = note.time - elapsed;
    const totalTravelTime = (W - HIT_X + 100) / currentNoteSpeed * 1000;
    const progress = 1 - (noteTime / totalTravelTime); // 0=右端出現 → 1=判定ライン到達
    let baseX = HIT_X + (noteTime / 1000) * currentNoteSpeed;

    // 画面外ならスキップ（外からくる以外）
    if (note.special !== 'outside' && note.special !== 'bunshin' && (baseX < -80 || baseX > W + 80)) return;

    const sp = note.special;
    let drawList = []; // [{x, y, r, alpha, rotation}]

    if (sp === 'curve') {
      // 変化球: sin波で蛇行
      const yOff = Math.sin(progress * note.curveFreq * Math.PI) * note.curveAmp;
      drawList.push({ x: baseX, y: laneY + yOff, r: NOTE_R, alpha: 1, rot: 0 });
    }
    else if (sp === 'spinoff') {
      // スピンオフ: 途中で急カーブ
      let yOff = 0;
      if (progress > note.spinOffAt) {
        const spinProgress = (progress - note.spinOffAt) / (1 - note.spinOffAt);
        // 急に逸れてから判定ラインに戻ってくる
        yOff = Math.sin(spinProgress * Math.PI) * 70 * note.spinDir;
        // X座標も少し乱す
        baseX += Math.sin(spinProgress * Math.PI * 2) * 20;
      }
      const rot = progress > note.spinOffAt ? (progress - note.spinOffAt) * 15 : 0;
      drawList.push({ x: baseX, y: laneY + yOff, r: NOTE_R, alpha: 1, rot });
    }
    else if (sp === 'outside') {
      // 外からくる: 上or下からレーンに合流
      let x, y;
      if (progress < 0.6) {
        // 画面外から斜めに飛来
        const p = progress / 0.6;
        x = W - p * (W - HIT_X) * 0.6;
        const startY = note.fromTop ? -40 : H + 40;
        y = startY + (laneY - startY) * p;
      } else {
        // レーンに合流して直進
        const p = (progress - 0.6) / 0.4;
        x = HIT_X + (1 - p) * (W * 0.4);
        y = laneY;
      }
      if (x < -80 || x > W + 80) return;
      drawList.push({ x, y, r: NOTE_R, alpha: 1, rot: 0 });
    }
    else if (sp === 'bunshin') {
      // 分身: 本物1つ + 偽物3つ
      if (baseX < -80 || baseX > W + 80) return;
      // 偽物（半透明でちょっとずれた位置）
      for (let b = 0; b < note.bunshinCount; b++) {
        const seed = note.bunshinSeed + b * 137;
        const bx = baseX + Math.sin(seed + elapsed * 0.003) * 35;
        const by = laneY + Math.cos(seed * 1.7 + elapsed * 0.004) * 30;
        drawList.push({ x: bx, y: by, r: NOTE_R, alpha: 0.3, rot: 0, fake: true });
      }
      // 本物（少し揺れる）
      const realY = laneY + Math.sin(elapsed * 0.005 + note.bunshinSeed) * 8;
      drawList.push({ x: baseX, y: realY, r: NOTE_R, alpha: 1, rot: 0 });
    }
    else if (sp === 'shrink') {
      // 急にサイズが小さくなる
      if (baseX < -80 || baseX > W + 80) return;
      let r = NOTE_R;
      if (progress > note.shrinkAt) {
        const shrinkP = Math.min((progress - note.shrinkAt) / 0.15, 1);
        r = NOTE_R * (1 - shrinkP * 0.6); // 最小40%サイズまで
      }
      drawList.push({ x: baseX, y: laneY, r, alpha: 1, rot: 0 });
    }
    else {
      // 通常ノーツ
      if (baseX < -50 || baseX > W + 50) return;
      drawList.push({ x: baseX, y: laneY, r: NOTE_R, alpha: 1, rot: 0 });
    }

    // 描画実行
    drawList.forEach(d => {
      ctx.save();
      ctx.globalAlpha = d.alpha;
      if (d.rot) {
        ctx.translate(d.x, d.y);
        ctx.rotate(d.rot);
        ctx.translate(-d.x, -d.y);
      }

      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      if (note.type === 'don') {
        ctx.fillStyle = d.fake ? '#d4a0a0' : '#c47070';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r - 5, 0, Math.PI * 2);
        ctx.fillStyle = d.fake ? '#e0b8b8' : '#d48888';
        ctx.fill();
      } else {
        ctx.fillStyle = d.fake ? '#90a8c0' : '#6088b0';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r - 5, 0, Math.PI * 2);
        ctx.fillStyle = d.fake ? '#a8c0d8' : '#78a0c8';
        ctx.fill();
      }

      // 影
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.strokeStyle = d.fake ? 'rgba(0,0,0,0.04)' : 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // 超人ノーツにはオーラエフェクト
      if (sp !== 'normal' && !d.fake) {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r + 4 + Math.sin(elapsed * 0.01) * 3, 0, Math.PI * 2);
        ctx.strokeStyle = note.type === 'don' ? 'rgba(196,112,112,0.25)' : 'rgba(96,136,176,0.25)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      ctx.restore();
    });

    // 超人ノーツの能力名表示（初登場時のみフラッシュ）
    if (sp !== 'normal' && !note._labelShown && progress > 0 && progress < 0.15) {
      note._labelShown = true;
    }
    if (sp !== 'normal' && progress > 0 && progress < 0.25) {
      const labelAlpha = Math.max(0, 1 - progress / 0.25);
      ctx.save();
      ctx.globalAlpha = labelAlpha;
      ctx.fillStyle = '#4a5a6e';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      const labelX = drawList[drawList.length - 1]?.x || baseX;
      const labelY = (drawList[drawList.length - 1]?.y || laneY) - NOTE_R - 10;
      const labels = { curve:'変化球', spinoff:'スピンオフ', outside:'外から!', bunshin:'分身', shrink:'縮小!' };
      ctx.fillText(labels[sp] || '', labelX, labelY);
      ctx.restore();
    }
  });

  // レーンのラベル
  ctx.fillStyle = '#a0aab8';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('ドン', HIT_X, laneY - 40);
  ctx.fillText('カッ', HIT_X, laneY + 50);
}

function hitNote(type) {
  if (!gameActive || !gameStartTime) return;
  const elapsed = performance.now() - gameStartTime;
  let closest = null;
  let closestDiff = Infinity;

  gameNotes.forEach(note => {
    if (note.hit || note.missed || note.type !== type) return;
    const diff = Math.abs(elapsed - note.time);
    if (diff < closestDiff) { closestDiff = diff; closest = note; }
  });

  if (!closest) return;

  if (closestDiff <= PERFECT_WINDOW) {
    closest.hit = true;
    gamePerfect++;
    gameScore += 300;
    gameCombo++;
    showJudge('PERFECT', 'perfect');
    playSE(type);
  } else if (closestDiff <= GOOD_WINDOW) {
    closest.hit = true;
    gameGood++;
    gameScore += 100;
    gameCombo++;
    showJudge('GOOD', 'good');
    playSE(type);
  } else if (closestDiff <= 200) {
    closest.hit = true;
    gameGood++;
    gameScore += 50;
    gameCombo++;
    showJudge('GOOD', 'good');
    playSE(type);
  } else {
    return; // まだ遠い、無視
  }

  // コンボボーナス
  if (gameCombo > 0 && gameCombo % 10 === 0) gameScore += 500;
  if (gameCombo > gameMaxCombo) gameMaxCombo = gameCombo;

  taikoScoreEl.textContent = gameScore;
  taikoComboEl.textContent = gameCombo;

  // ヒットエフェクト
  flashHitZone(type);
  spawnHitCelebration();
}

function flashHitZone(type) {
  const ctx = taikoCtx;
  const laneY = taikoCanvas.height / 2;
  ctx.beginPath();
  ctx.arc(HIT_X, laneY, 36, 0, Math.PI * 2);
  ctx.fillStyle = type === 'don' ? 'rgba(196,112,112,0.3)' : 'rgba(96,136,176,0.3)';
  ctx.fill();
}

let judgeTimeout = null;
function showJudge(text, cls) {
  taikoJudgeEl.textContent = text;
  taikoJudgeEl.className = 'taiko-judge show ' + cls;
  clearTimeout(judgeTimeout);
  judgeTimeout = setTimeout(() => {
    taikoJudgeEl.classList.remove('show');
  }, 400);
}

function endTaikoGame() {
  gameActive = false;
  if (gameAnimId) cancelAnimationFrame(gameAnimId);
  stopBGM();
  taikoOverlay.classList.remove('active');
  document.body.style.overflow = '';

  // スコアに応じて記事を解放（高スコアほど恥ずかしい記事が解放）
  const maxPossible = gameNotes.length * 300 + Math.floor(gameNotes.length / 10) * 500;
  const ratio = gameScore / maxPossible;

  // ratio が高いほどインデックスが大きい（恥ずかしい）記事まで解放
  let unlockCount;
  if (ratio >= 0.85) unlockCount = 6;      // 全記事解放
  else if (ratio >= 0.7) unlockCount = 5;
  else if (ratio >= 0.55) unlockCount = 4;
  else if (ratio >= 0.4) unlockCount = 3;
  else if (ratio >= 0.2) unlockCount = 2;
  else unlockCount = 1;                     // 最低でも1記事

  const absSongs = getArticlesByScoreSongs();
  const prevUnlockCount = unlockedSet.size;

  // アンロック状態を更新
  unlockSongsUpTo(unlockCount);

  const unlockedArticles = absSongs.slice(0, unlockCount);

  // リザルト画面を表示
  document.getElementById('resultScore').textContent = gameScore;
  document.getElementById('resultPerfect').textContent = gamePerfect;
  document.getElementById('resultGood').textContent = gameGood;
  document.getElementById('resultMiss').textContent = gameMiss;
  document.getElementById('resultMaxCombo').textContent = gameMaxCombo;

  // アンロック記事リストを構築
  const unlockEl = document.getElementById('resultUnlock');
  unlockEl.innerHTML = `<h3>UNLOCKED ${unlockedSet.size}/${songs.length} ARTICLES</h3>`;
  unlockedArticles.forEach((article, i) => {
    const songIdx = songs.indexOf(article);
    const wasAlreadyUnlocked = i < prevUnlockCount;
    const isNew = !wasAlreadyUnlocked;
    const link = document.createElement('a');
    link.className = 'result-unlock-link';
    link.href = article.url;
    link.target = '_blank';
    if (isNew) link.style.boxShadow = '0 0 0 2px #c47070, inset 3px 3px 6px #b8bec7, inset -3px -3px 6px #fff';
    link.innerHTML = `
      <img src="${article.thumb}" alt="">
      <div class="info">
        <div class="t">${isNew ? '🔓 NEW! ' : ''}${article.title}</div>
        <div class="d">${article.artist}</div>
      </div>
    `;
    unlockEl.appendChild(link);
  });

  resultOverlay.classList.add('active');
}

// ゲーム用キー入力
document.addEventListener('keydown', (e) => {
  if (!gameActive) return;
  const key = e.key.toLowerCase();
  if (key === 'd' || key === 'f') { e.preventDefault(); hitNote('don'); }
  else if (key === 'j' || key === 'k') { e.preventDefault(); hitNote('ka'); }
});

// タッチ用ボタン
['touchstart','mousedown'].forEach(evt => {
  document.getElementById('touchDon').addEventListener(evt, (e) => {
    e.preventDefault(); hitNote('don');
  }, { passive: false });
  document.getElementById('touchKa').addEventListener(evt, (e) => {
    e.preventDefault(); hitNote('ka');
  }, { passive: false });
});

// リザルト画面の戻るボタン
document.getElementById('resultBackBtn').addEventListener('click', () => {
  resultOverlay.classList.remove('active');
  // ホイールを再構築してアンロック状態を反映
  buildWheel();
  updateDetail(songs[selectedIndex]);
});

window.addEventListener('resize', () => {
  if (gameActive) resizeTaikoCanvas();
});

document.querySelectorAll('.diff-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});


updateDetail(songs[0]);
buildWheel();

window.addEventListener('resize', () => { containerH = containerEl.clientHeight; layoutWheel(); });
</script>
